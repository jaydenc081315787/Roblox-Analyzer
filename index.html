<!DOCTYPE html>
<html>
<head>
  <title>Roblox Analyzer</title>

  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: 0.3s;
    }

    :root {
      --bg: #050814;
      --text: #e6f1ff;
      --card: rgba(255,255,255,0.05);
      --accent: #00ffd5;
    }

    body.light {
      --bg: #f5f7ff;
      --text: #111;
      --card: white;
      --accent: #2563eb;
    }

    header {
      padding: 18px;
      font-size: 22px;
      color: var(--accent);
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      cursor: pointer;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 80%;
    }

    .card {
      margin: 20px;
      padding: 20px;
      background: var(--card);
      border-radius: 12px;
    }

    img {
      width: 100px;
      border-radius: 50%;
    }

    .bar {
      height: 10px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffd5, orange, red);
      transition: 1s;
    }

    .history {
      margin: 20px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: rgba(0,255,213,0.05);
      margin: 5px;
      border-radius: 6px;
    }

    .item span {
      cursor: pointer;
      flex: 1;
    }

    .item button {
      font-size: 10px;
      padding: 3px 6px;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: var(--bg);
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>Roblox Analyzer</header>

<button onclick="toggleTheme()">🌙 / ☀️ Theme</button>

<br><br>

<input id="username" placeholder="Enter Roblox username">
<br>
<button onclick="check()">Analyze</button>

<div id="result"></div>

<div class="history" id="history"></div>

<div class="nav">
  <button onclick="window.scrollTo(0,0)">🏠</button>
  <button onclick="document.getElementById('history').scrollIntoView()">🔎</button>
</div>

<script>
let history = JSON.parse(localStorage.getItem("history") || "[]");

function saveHistory(name) {
  history.unshift(name);
  history = history.slice(0, 5);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const box = document.getElementById("history");
  box.innerHTML = history.map((h, i) => `
    <div class="item">
      <span onclick="searchFromHistory('${h}')">🔎 ${h}</span>
      <button onclick="deleteItem(${i})">🗑</button>
    </div>
  `).join("");
}

function deleteItem(i) {
  history.splice(i, 1);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function searchFromHistory(name) {
  document.getElementById("username").value = name;
  check();
}

function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

window.onload = () => {
  renderHistory();
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
};

async function check() {
  const username = document.getElementById("username").value;
  const result = document.getElementById("result");

  if (!username) return;

  saveHistory(username);

  result.innerHTML = "<div class='card'>Loading...</div>";

  try {
    const res = await fetch("https://api.allorigins.win/raw?url=https://users.roblox.com/v1/usernames/users", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({usernames:[username]})
    });

    const data = await res.json();
    const user = data.data?.[0];

    if (!user) {
      result.innerHTML = "<div class='card'>User not found</div>";
      return;
    }

    const id = user.id;
    const age = Math.floor((new Date() - new Date(user.created)) / (1000*60*60*24));
    const avatar = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`;

    let percent = age < 30 ? 70 : 30;

    let summary = "Normal account behavior.";
    if (age < 30) summary = "New account.";
    if (age < 10) summary = "Very new account.";

    result.innerHTML = `
      <div class="card">
        <img src="${avatar}">
        <h2>${user.name}</h2>
        <p>ID: ${id}</p>
        <p>Age: ${age} days</p>

        <div class="bar">
          <div class="fill" id="fill"></div>
        </div>

        <p>${percent}% profile score</p>
        <p>🧠 ${summary}</p>
      </div>
    `;

    setTimeout(() => {
      document.getElementById("fill").style.width = percent + "%";
    }, 200);

  } catch (e) {
    result.innerHTML = "<div class='card'>Error loading</div>";
  }
}
</script>

</body>
</html>

<script>
// =========================
// STORAGE
// =========================
let history = JSON.parse(localStorage.getItem("history") || "[]");

// =========================
// HISTORY FUNCTIONS
// =========================
function saveHistory(name) {
  history.unshift(name);
  history = history.slice(0, 5);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const box = document.getElementById("history");
  if (!box) return;

  box.innerHTML = history.map((h, i) => `
    <div class="item">
      <span onclick="searchFromHistory('${h}')">🔎 ${h}</span>
      <button onclick="deleteItem(${i})">🗑</button>
    </div>
  `).join("");
}

function deleteItem(i) {
  history.splice(i, 1);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function searchFromHistory(name) {
  document.getElementById("username").value = name;
  check();
}

// =========================
// THEME
// =========================
function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

// load on start
window.onload = () => {
  renderHistory();

  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
};

// =========================
// FETCH WITH FALLBACK
// =========================
async function fetchUser(username) {
  const body = JSON.stringify({ usernames: [username] });

  const proxies = [
    "https://corsproxy.io/?",
    "https://proxy.cors.sh/",
    "https://api.allorigins.win/raw?url="
  ];

  for (let proxy of proxies) {
    try {
      const res = await fetch(proxy + "https://users.roblox.com/v1/usernames/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body
      });

      const data = await res.json();
      if (data.data && data.data[0]) {
        return data.data[0];
      }
    } catch (e) {
      console.log("Proxy failed:", proxy);
    }
  }

  throw new Error("All proxies failed");
}

// =========================
// MAIN FUNCTION
// =========================
async function check() {
  const username = document.getElementById("username").value;
  const result = document.getElementById("result");

  if (!username) return;

  saveHistory(username);

  result.innerHTML = "<div class='card'>🔄 Scanning...</div>";

  try {
    const user = await fetchUser(username);

    const id = user.id;
    const age = Math.floor((new Date() - new Date(user.created)) / (1000 * 60 * 60 * 24));

    const avatar = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`;

    // SIMPLE ANALYSIS
    let percent = age < 30 ? 70 : 30;

    let summary = "Normal account behavior.";
    if (age < 30) summary = "New account.";
    if (age < 10) summary = "Very new account.";

    result.innerHTML = `
      <div class="card">
        <img src="${avatar}">
        <h2>${user.name}</h2>

        <p>ID: ${id}</p>
        <p>Age: ${age} days</p>

        <div class="bar">
          <div class="fill" id="fill"></div>
        </div>

        <p>${percent}% profile score</p>
        <p>🧠 ${summary}</p>
      </div>
    `;

    setTimeout(() => {
      document.getElementById("fill").style.width = percent + "%";
    }, 200);

  } catch (err) {
    result.innerHTML = "<div class='card'>❌ Could not load user (try again)</div>";
  }
}
</script>
